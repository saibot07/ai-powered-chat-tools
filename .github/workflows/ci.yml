name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Python linting/tests
      run: |
        if [ -f requirements.txt ]; then
          if command -v pytest &> /dev/null; then pytest; fi
          if command -v flake8 &> /dev/null; then flake8 .; fi
        fi

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    - name: Install Node.js dependencies
      run: |
        if [ -f package.json ]; then npm install; fi

    - name: Run Node.js linting/tests
      run: |
        if [ -f package.json ]; then
          if [ -f package-lock.json ] || [ -d node_modules ]; then
            if command -v npm &> /dev/null && npm test --help &> /dev/null; then npm test; fi
            if command -v npm &> /dev/null && npm run lint --help &> /dev/null; then npm run lint; fi
          fi
        fi